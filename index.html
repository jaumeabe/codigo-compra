<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Códigos de Compra</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, Segoe UI, Roboto, sans-serif;
    background: #f4f6f9;
    margin: 0;
    padding: 20px;
    color: #222;
  }
  .container {
    max-width: 720px;
    margin: 0 auto;
  }
  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }
  h1 { font-size: 22px; margin: 0; }
  .card {
    background: #fff;
    border-radius: 10px;
    padding: 24px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    margin-bottom: 20px;
  }
  label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 6px;
    color: #444;
  }
  input, textarea, select {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid #d0d5dd;
    border-radius: 6px;
    font-size: 14px;
    font-family: inherit;
    margin-bottom: 14px;
  }
  textarea { resize: vertical; min-height: 70px; }
  button {
    background: #2563eb;
    color: #fff;
    border: none;
    padding: 11px 18px;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }
  button:hover { background: #1d4ed8; }
  button.secondary { background: #64748b; }
  button.secondary:hover { background: #475569; }
  button.danger { background: #dc2626; }
  button.danger:hover { background: #b91c1c; }
  .admin-link {
    background: none;
    color: #2563eb;
    padding: 6px 10px;
    font-size: 13px;
  }
  .admin-link:hover { background: #eff6ff; }
  .result {
    margin-top: 16px;
    padding: 18px;
    background: #ecfdf5;
    border: 1px solid #10b981;
    border-radius: 8px;
    text-align: center;
    display: none;
  }
  .result.show { display: block; }
  .result .code {
    font-size: 28px;
    font-weight: 700;
    color: #065f46;
    letter-spacing: 1px;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    margin-top: 10px;
  }
  th, td {
    padding: 8px 10px;
    text-align: left;
    border-bottom: 1px solid #e5e7eb;
  }
  th { background: #f9fafb; font-weight: 600; }
  .hidden { display: none; }
  .row { display: flex; gap: 12px; }
  .row > div { flex: 1; }
  .toolbar { display: flex; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
  .empty { text-align: center; color: #888; padding: 20px; }
</style>
</head>
<body>
<div class="container">

  <header>
    <h1>Gestión de Códigos de Compra</h1>
    <button class="admin-link" onclick="showAdmin()">Administrador</button>
  </header>

  <!-- FORMULARIO -->
  <div id="formView" class="card">
    <form id="purchaseForm">
      <label>Fecha</label>
      <input type="date" id="fecha" required>

      <label>Nombre de la granja</label>
      <input type="text" id="granja" required placeholder="Ej: Granja Can Pere">

      <label>Descripción</label>
      <textarea id="descripcion" required placeholder="Descripción del material o servicio"></textarea>

      <label>Proveedor</label>
      <input type="text" id="proveedor" required placeholder="Ej: Ferretería Martí">

      <label>Importe (€)</label>
      <input type="number" id="importe" step="0.01" min="0" required placeholder="0.00">

      <label>Comprador</label>
      <input type="text" id="comprador" required placeholder="Nombre del comprador">

      <button type="submit">Generar código de autorización</button>
    </form>

    <div id="result" class="result">
      <div>Código de autorización generado:</div>
      <div class="code" id="generatedCode"></div>
      <div style="margin-top:10px; font-size:13px; color:#555;">Guardado correctamente.</div>
    </div>
  </div>

  <!-- ADMIN LOGIN -->
  <div id="loginView" class="card hidden">
    <h2 style="margin-top:0;">Acceso administrador</h2>
    <label>Contraseña</label>
    <input type="password" id="adminPass" placeholder="Introduce la contraseña">
    <div style="display:flex; gap:10px;">
      <button onclick="doLogin()">Entrar</button>
      <button class="secondary" onclick="showForm()">Volver</button>
    </div>
    <p id="loginError" style="color:#dc2626; font-size:13px; display:none; margin-top:10px;">Contraseña incorrecta</p>
  </div>

  <!-- PANEL ADMIN -->
  <div id="adminView" class="card hidden">
    <div style="display:flex; justify-content:space-between; align-items:center;">
      <h2 style="margin:0;">Panel de administración</h2>
      <button class="secondary" onclick="showForm()">Volver</button>
    </div>
    <div class="toolbar" style="margin-top:16px;">
      <button onclick="exportExcel()">Descargar Excel</button>
      <button class="danger" onclick="clearAll()">Borrar todo</button>
    </div>
    <div id="tableContainer"></div>
  </div>

</div>

<script>
const STORAGE_KEY = 'codigos_compra_v1';
const ADMIN_PASSWORD = 'admin1234'; // cámbiala cuando quieras

// Inicializa fecha
document.getElementById('fecha').valueAsDate = new Date();

function getRecords() {
  return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
}
function saveRecords(r) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(r));
}

function generateCode(records) {
  // Busca el mayor número ya usado y suma 1
  let max = 0;
  for (const r of records) {
    const m = /^C-(\d+)$/.exec(r.codigo || '');
    if (m) max = Math.max(max, parseInt(m[1], 10));
  }
  const next = (max + 1).toString().padStart(4, '0');
  return 'C-' + next;
}

document.getElementById('purchaseForm').addEventListener('submit', function(e) {
  e.preventDefault();
  const records = getRecords();
  const codigo = generateCode(records);
  const record = {
    codigo,
    fecha: document.getElementById('fecha').value,
    granja: document.getElementById('granja').value.trim(),
    descripcion: document.getElementById('descripcion').value.trim(),
    proveedor: document.getElementById('proveedor').value.trim(),
    importe: parseFloat(document.getElementById('importe').value),
    comprador: document.getElementById('comprador').value.trim(),
    creado: new Date().toISOString()
  };
  records.push(record);
  saveRecords(records);

  document.getElementById('generatedCode').textContent = codigo;
  document.getElementById('result').classList.add('show');
  this.reset();
  document.getElementById('fecha').valueAsDate = new Date();
  window.scrollTo({ top: 0, behavior: 'smooth' });
});

function showForm() {
  document.getElementById('formView').classList.remove('hidden');
  document.getElementById('loginView').classList.add('hidden');
  document.getElementById('adminView').classList.add('hidden');
  document.getElementById('loginError').style.display = 'none';
  document.getElementById('adminPass').value = '';
}
function showAdmin() {
  document.getElementById('formView').classList.add('hidden');
  document.getElementById('loginView').classList.remove('hidden');
  document.getElementById('adminView').classList.add('hidden');
  document.getElementById('adminPass').focus();
}
function doLogin() {
  const pass = document.getElementById('adminPass').value;
  if (pass === ADMIN_PASSWORD) {
    document.getElementById('loginView').classList.add('hidden');
    document.getElementById('adminView').classList.remove('hidden');
    renderTable();
  } else {
    document.getElementById('loginError').style.display = 'block';
  }
}
document.getElementById('adminPass').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

function renderTable() {
  const records = getRecords();
  const container = document.getElementById('tableContainer');
  if (records.length === 0) {
    container.innerHTML = '<div class="empty">No hay registros todavía.</div>';
    return;
  }
  let html = `<table>
    <thead><tr>
      <th>Código</th><th>Fecha</th><th>Granja</th><th>Descripción</th>
      <th>Proveedor</th><th>Importe</th><th>Comprador</th>
    </tr></thead><tbody>`;
  for (const r of records.slice().reverse()) {
    html += `<tr>
      <td><strong>${r.codigo}</strong></td>
      <td>${r.fecha}</td>
      <td>${escapeHtml(r.granja)}</td>
      <td>${escapeHtml(r.descripcion)}</td>
      <td>${escapeHtml(r.proveedor)}</td>
      <td>${r.importe.toFixed(2)} €</td>
      <td>${escapeHtml(r.comprador)}</td>
    </tr>`;
  }
  html += '</tbody></table>';
  container.innerHTML = html;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  })[c]);
}

function exportExcel() {
  const records = getRecords();
  if (records.length === 0) {
    alert('No hay registros para exportar.');
    return;
  }
  const data = records.map(r => ({
    'Código': r.codigo,
    'Fecha': r.fecha,
    'Granja': r.granja,
    'Descripción': r.descripcion,
    'Proveedor': r.proveedor,
    'Importe (€)': r.importe,
    'Comprador': r.comprador
  }));
  const ws = XLSX.utils.json_to_sheet(data);
  ws['!cols'] = [
    {wch:10},{wch:12},{wch:20},{wch:35},{wch:20},{wch:12},{wch:18}
  ];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Códigos de compra');
  const today = new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb, `codigos_compra_${today}.xlsx`);
}

function clearAll() {
  if (confirm('¿Seguro que quieres borrar TODOS los registros? Esta acción no se puede deshacer.')) {
    saveRecords([]);
    renderTable();
  }
}
</script>
</body>
</html>
